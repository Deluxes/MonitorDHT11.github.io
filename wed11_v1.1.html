<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌦 Estación Climática + Viento | Nodo Lecturas</title>
    <style>
        /* Futurista / Glassmorphism (mismo estilo base) */
        :root {
            --bg-deep: #06060f;
            --bg-card: rgba(14, 14, 35, 0.75);
            --bg-card-solid: #0e0e23;
            --cyan: #00e5ff;
            --cyan-glow: rgba(0, 229, 255, 0.5);
            --magenta: #ff4081;
            --magenta-glow: rgba(255, 64, 129, 0.5);
            --green: #69f0ae;
            --green-glow: rgba(105, 240, 174, 0.45);
            --gold: #ffd740;
            --gold-glow: rgba(255, 215, 64, 0.5);
            --orange: #ff9d4a;
            --orange-glow: rgba(255, 157, 74, 0.5);
            --purple: #b388ff;
            --text: #e8e8f0;
            --text-muted: #a0a0c0;
            --border-subtle: rgba(255, 255, 255, 0.07);
            --border-glow: rgba(255, 255, 255, 0.15);
            --radius-lg: 1.25rem;
            --radius-md: 0.85rem;
            --radius-sm: 0.55rem;
            --font-mono: 'SF Mono', 'Fira Code', 'Consolas', 'Monaco', monospace;
            --transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-smooth: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-deep);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 1.5rem 1rem 3rem;
            position: relative;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background:
                radial-gradient(ellipse at 25% 15%, rgba(0, 229, 255, 0.06) 0%, transparent 55%),
                radial-gradient(ellipse at 72% 60%, rgba(255, 64, 129, 0.05) 0%, transparent 55%),
                radial-gradient(ellipse at 40% 80%, rgba(105, 240, 174, 0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(179, 136, 255, 0.05) 0%, transparent 50%);
            background-size: 100% 100%;
            animation: bgPulse 12s ease-in-out infinite;
        }
        @keyframes bgPulse {
            0%, 100% { opacity: 0.8; }
            33% { opacity: 1; }
            66% { opacity: 0.7; }
        }
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background-image: radial-gradient(circle, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
            background-size: 28px 28px;
            mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
            -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
        }
        .container {
            max-width: 720px;
            width: 100%;
            position: relative;
            z-index: 1;
        }
        header {
            text-align: center;
            margin-bottom: 1.8rem;
        }
        .header-badge {
            display: inline-block;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.25em;
            color: var(--cyan);
            border: 1px solid rgba(0, 229, 255, 0.35);
            padding: 0.35em 1.2em;
            border-radius: 2rem;
            margin-bottom: 0.7rem;
            background: rgba(0, 229, 255, 0.06);
            backdrop-filter: blur(6px);
            animation: badgeGlow 3s ease-in-out infinite;
        }
        @keyframes badgeGlow {
            0%, 100% { box-shadow: 0 0 8px rgba(0, 229, 255, 0.2); }
            50% { box-shadow: 0 0 20px rgba(0, 229, 255, 0.45); }
        }
        header h1 {
            font-size: 2.1rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #e0f0ff 0%, #80d8ff 30%, #b388ff 65%, #ff80ab 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.2rem;
        }
        header p {
            color: var(--text-muted);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .live-dot {
            display: inline-block;
            width: 9px;
            height: 9px;
            background: #00ff88;
            border-radius: 50%;
            animation: livePulse 1.4s ease-in-out infinite;
            box-shadow: 0 0 8px #00ff88;
        }
        @keyframes livePulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.35; transform: scale(1.7); }
        }
        .glass-card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            padding: 1.4rem 1.5rem;
            backdrop-filter: blur(18px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.03);
            transition: all var(--transition-smooth);
            position: relative;
            overflow: hidden;
        }
        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
        }
        .glass-card:hover {
            box-shadow: 0 12px 40px rgba(0,0,0,0.55);
            border-color: var(--border-glow);
        }
        .stats-section {
            margin-bottom: 1.4rem;
        }
        .stats-section h3 {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--text-muted);
            margin-bottom: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .stats-section h3::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-subtle);
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 0.7rem;
        }
        .stat-mini-card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            padding: 0.8rem 1rem;
            backdrop-filter: blur(10px);
            transition: all var(--transition-fast);
        }
        .stat-mini-card:hover {
            border-color: var(--border-glow);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
        .stat-mini-card .stat-icon { font-size: 1.3rem; margin-bottom: 0.25rem; }
        .stat-mini-card .stat-var-name {
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            font-weight: 600;
            margin-bottom: 0.55rem;
        }
        .stat-mini-card .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.78rem;
            padding: 0.22rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .stat-mini-card .stat-row:last-child { border-bottom: none; }
        .stat-mini-card .stat-label { color: var(--text-muted); font-size: 0.7rem; }
        .stat-mini-card .stat-val { font-weight: 600; font-family: var(--font-mono); font-size: 0.78rem; }
        .stat-mini-card.temp { border-left: 3px solid var(--cyan); }
        .stat-mini-card.temp .stat-var-name { color: var(--cyan); }
        .stat-mini-card.hum { border-left: 3px solid var(--magenta); }
        .stat-mini-card.hum .stat-var-name { color: var(--magenta); }
        .stat-mini-card.pres { border-left: 3px solid var(--green); }
        .stat-mini-card.pres .stat-var-name { color: var(--green); }
        .stat-mini-card.rain { border-left: 3px solid var(--gold); }
        .stat-mini-card.rain .stat-var-name { color: var(--gold); }
        .stat-mini-card.wind { border-left: 3px solid var(--orange); }
        .stat-mini-card.wind .stat-var-name { color: var(--orange); }
        .stat-mini-card.wind .stat-val { color: #ffc29e; }

        .latest-card {
            margin-bottom: 0.9rem;
            position: relative;
        }
        .latest-card .card-halo {
            position: absolute;
            inset: -3px;
            border-radius: calc(var(--radius-lg) + 3px);
            padding: 3px;
            background: linear-gradient(135deg, rgba(0,229,255,0.35), rgba(179,136,255,0.35), rgba(255,157,74,0.3), rgba(0,229,255,0.35));
            background-size: 300% 300%;
            animation: haloRotate 6s linear infinite;
            z-index: -1;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }
        @keyframes haloRotate {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .latest-card h2 {
            text-align: center;
            margin-bottom: 1rem;
            font-size: 1.2rem;
            font-weight: 600;
            color: #d0d8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .latest-card .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.7rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .latest-card .row:last-child { border-bottom: none; }
        .latest-card .label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        .latest-card .value {
            font-weight: 650;
            font-size: 1.15rem;
            font-family: var(--font-mono);
        }
        .value.temp { color: var(--cyan); text-shadow: 0 0 12px var(--cyan-glow); }
        .value.hum { color: var(--magenta); text-shadow: 0 0 12px var(--magenta-glow); }
        .value.pres { color: var(--green); text-shadow: 0 0 12px var(--green-glow); }
        .value.rain { color: var(--gold); text-shadow: 0 0 12px var(--gold-glow); }
        .value.wind { color: var(--orange); text-shadow: 0 0 12px var(--orange-glow); }
        .value.time { color: #b0b8d0; font-size: 0.82rem; }

        .dropdown-section { margin-bottom: 1rem; }
        .dropdown-toggle {
            width: 100%;
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            color: var(--text);
            padding: 0.85rem 1.3rem;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            backdrop-filter: blur(14px);
            transition: all var(--transition-fast);
        }
        .dropdown-toggle:hover {
            border-color: var(--border-glow);
            background: rgba(20,20,45,0.8);
        }
        .dropdown-toggle .arrow {
            display: inline-block;
            transition: transform var(--transition-smooth);
            font-size: 0.75rem;
        }
        .dropdown-toggle.open .arrow { transform: rotate(180deg); }
        .dropdown-toggle .record-count {
            font-size: 0.7rem;
            background: rgba(0,229,255,0.15);
            color: var(--cyan);
            padding: 0.2em 0.7em;
            border-radius: 2rem;
        }
        .dropdown-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s cubic-bezier(0.4,0,0.2,1), opacity 0.35s ease;
            opacity: 0;
        }
        .dropdown-content.expanded {
            max-height: 450px;
            opacity: 1;
            overflow-y: auto;
        }
        .dropdown-inner {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-top: none;
            border-radius: 0 0 var(--radius-md) var(--radius-md);
            padding: 0.5rem 0.8rem 0.8rem;
            backdrop-filter: blur(14px);
        }
        .records-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.75rem;
            font-family: var(--font-mono);
        }
        .records-table thead th {
            position: sticky;
            top: 0;
            background: rgba(14,14,35,0.95);
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.65rem;
            padding: 0.55rem 0.3rem;
            border-bottom: 2px solid var(--border-subtle);
            text-align: center;
        }
        .records-table thead th:first-child { text-align: left; padding-left: 0.3rem; }
        .records-table tbody td {
            padding: 0.45rem 0.3rem;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            color: #c8c8e0;
            white-space: nowrap;
        }
        .records-table tbody td:first-child { text-align: left; color: #9090b0; }
        .records-table .td-temp { color: #b3f0ff; }
        .records-table .td-hum { color: #ffb3c6; }
        .records-table .td-pres { color: #b9f6ca; }
        .records-table .td-rain { color: #ffe9a0; }
        .records-table .td-wind { color: #ffc29e; }
        .footer {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.72rem;
            margin-top: 0.5rem;
        }
        .footer span { color: var(--cyan); }
        .loading, .error-msg {
            text-align: center;
            padding: 2rem 1rem;
            color: var(--text-muted);
        }
        .error-msg { color: #ff6b6b; }
        .spinner-ring {
            display: inline-block;
            width: 32px;
            height: 32px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--cyan);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="container">
    <header>
        <div class="header-badge">🌬️ VIENTO + CLIMA</div>
        <h1>🌦 Estación Climática</h1>
        <p><span class="live-dot"></span> Monitoreo en tiempo real · nodo 'lecturas'</p>
    </header>

    <section class="stats-section" id="stats-section">
        <h3>📊 Parámetros Estadísticos</h3>
        <div class="stats-grid" id="stats-grid"></div>
    </section>

    <div class="glass-card latest-card" id="latest-card">
        <div class="card-halo"></div>
        <div id="latest-content"></div>
    </div>

    <div class="dropdown-section">
        <button class="dropdown-toggle" id="dropdown-btn" onclick="toggleDropdown()">
            📋 <span>Historial completo · lecturas</span>
            <span class="record-count" id="record-count-badge">0</span>
            <span class="arrow">▼</span>
        </button>
        <div class="dropdown-content" id="dropdown-content">
            <div class="dropdown-inner">
                <div style="overflow-x:auto;">
                    <table class="records-table" id="records-table">
                        <thead>
                            <tr><th>🕒 Fecha/Hora</th><th>🌡️ Temp</th><th>💧 Hum</th><th>🌀 Pres</th><th>☔ Lluvia</th><th>🌬️ Viento</th></tr>
                        </thead>
                        <tbody id="records-tbody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <div class="footer"><span>NASA Corporation</span> &copy; <span id="current-year"></span> · Velocidad del viento integrada</div>
</div>

<script>
    // ================= CONFIGURACIÓN =================
    const FIREBASE_LECTURAS_URL = 'https://climaescuela-default-rtdb.firebaseio.com/lecturas.json';
    const FIREBASE_TOKEN = 'mTwK2qt2iXMujqxojHCRUItX0dXPFN1ws0sn7eSV';
    const REFRESH_INTERVAL = 10000;

    // DOM elements
    const latestContent = document.getElementById('latest-content');
    const statsGrid = document.getElementById('stats-grid');
    const recordsTbody = document.getElementById('records-tbody');
    const recordCountBadge = document.getElementById('record-count-badge');
    const dropdownContent = document.getElementById('dropdown-content');
    const dropdownBtn = document.getElementById('dropdown-btn');

    let allLecturas = [];
    let dropdownOpen = false;

    // Helper: formateo de timestamp
    function formatDate(timestamp) {
        return new Date(timestamp * 1000).toLocaleString('es-MX', {
            year: 'numeric', month: 'short', day: 'numeric',
            hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true
        });
    }
    function formatShort(timestamp) {
        return new Date(timestamp * 1000).toLocaleString('es-MX', {
            month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', hour12: true
        });
    }

    // Estadísticas básicas
    function avg(arr) { return arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : 0; }
    function max(arr) { return arr.length ? Math.max(...arr) : 0; }
    function min(arr) { return arr.length ? Math.min(...arr) : 0; }
    function std(arr) {
        if(arr.length < 2) return 0;
        const mean = avg(arr);
        return Math.sqrt(arr.reduce((sq,x)=>sq+(x-mean)**2,0)/arr.length);
    }

    // Renderizar 5 tarjetas estadísticas (incluye viento)
    function renderStats(records) {
        if(!records.length) {
            statsGrid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:1rem;">Sin datos en lecturas</div>';
            return;
        }
        const temps = records.map(r=>r.temperatura).filter(v=>typeof v==='number');
        const hums = records.map(r=>r.humedad).filter(v=>typeof v==='number');
        const pres = records.map(r=>r.presion).filter(v=>typeof v==='number');
        const rains = records.map(r=>r.lluvia).filter(v=>typeof v==='number');
        const winds = records.map(r=>r.velocidad_viento).filter(v=>typeof v==='number');

        const config = [
            {icon:'🌡️', name:'Temp.', unit:'°C', values:temps, cls:'temp', dec:2},
            {icon:'💧', name:'Humedad', unit:'%', values:hums, cls:'hum', dec:2},
            {icon:'🌀', name:'Presión', unit:'hPa', values:pres, cls:'pres', dec:1},
            {icon:'☔', name:'Lluvia', unit:'mm', values:rains, cls:'rain', dec:2},
            {icon:'🌬️', name:'Viento', unit:'km/h', values:winds, cls:'wind', dec:2}
        ];
        let html = '';
        for(let cfg of config) {
            const vals = cfg.values;
            html += `
            <div class="stat-mini-card ${cfg.cls}">
                <div class="stat-icon">${cfg.icon}</div>
                <div class="stat-var-name">${cfg.name}</div>
                <div class="stat-row"><span class="stat-label">Promedio</span><span class="stat-val">${avg(vals).toFixed(cfg.dec)} ${cfg.unit}</span></div>
                <div class="stat-row"><span class="stat-label">Máx</span><span class="stat-val">${max(vals).toFixed(cfg.dec)} ${cfg.unit}</span></div>
                <div class="stat-row"><span class="stat-label">Mín</span><span class="stat-val">${min(vals).toFixed(cfg.dec)} ${cfg.unit}</span></div>
                <div class="stat-row"><span class="stat-label">Desv.Est</span><span class="stat-val">${std(vals).toFixed(cfg.dec)} ${cfg.unit}</span></div>
            </div>`;
        }
        statsGrid.innerHTML = html;
    }

    // Último registro (más reciente) incluyendo viento
    function renderLatest(records) {
        if(!records.length) {
            latestContent.innerHTML = `<div class="error-msg">⚠️ No hay registros en el nodo "lecturas"</div>`;
            return;
        }
        const ultimo = records.reduce((a,b)=> a.timestamp > b.timestamp ? a : b);
        latestContent.innerHTML = `
            <h2>📡 ÚLTIMO REGISTRO · <span style="color:#ff9d4a">incluye viento</span> <span class="live-dot" style="width:8px;height:8px;"></span></h2>
            <div class="row"><span class="label">🌡️ Temperatura</span><span class="value temp">${ultimo.temperatura.toFixed(2)} °C</span></div>
            <div class="row"><span class="label">💧 Humedad</span><span class="value hum">${ultimo.humedad.toFixed(2)} %</span></div>
            <div class="row"><span class="label">🌀 Presión</span><span class="value pres">${ultimo.presion.toFixed(1)} hPa</span></div>
            <div class="row"><span class="label">☔ Lluvia acum.</span><span class="value rain">${ultimo.lluvia.toFixed(2)} mm</span></div>
            <div class="row"><span class="label">🌬️ Velocidad viento</span><span class="value wind">${ultimo.velocidad_viento.toFixed(2)} km/h</span></div>
            <div class="row"><span class="label">🕒 Registrado</span><span class="value time">${formatDate(ultimo.timestamp)}</span></div>
        `;
    }

    // Tabla histórica con columna extra de viento
    function renderTable(records) {
        if(!records.length) {
            recordsTbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">No hay lecturas registradas</td></tr>';
            recordCountBadge.textContent = '0';
            return;
        }
        const sorted = [...records].sort((a,b)=> b.timestamp - a.timestamp);
        recordCountBadge.textContent = sorted.length;
        let rows = '';
        for(let r of sorted) {
            rows += `<tr>
                <td>${formatShort(r.timestamp)}</td>
                <td class="td-temp">${r.temperatura.toFixed(1)}°C</td>
                <td class="td-hum">${r.humedad.toFixed(1)}%</td>
                <td class="td-pres">${r.presion.toFixed(0)} hPa</td>
                <td class="td-rain">${r.lluvia.toFixed(1)} mm</td>
                <td class="td-wind">${r.velocidad_viento.toFixed(1)} km/h</td>
            </tr>`;
        }
        recordsTbody.innerHTML = rows;
    }

    function showLoading() {
        latestContent.innerHTML = '<div class="loading"><span class="spinner-ring"></span> Cargando nodo lecturas + viento...</div>';
        statsGrid.innerHTML = '<div style="grid-column:1/-1;text-align:center;">Calculando estadísticas...</div>';
        recordsTbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">Cargando historial...</td></tr>';
        recordCountBadge.textContent = '···';
    }

    function showError(msg) {
        latestContent.innerHTML = `<div class="error-msg">❌ ${msg}</div>`;
        statsGrid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:#ff6b6b;">Error estadísticas</div>';
        recordsTbody.innerHTML = `<tr><td colspan="6" style="text-align:center;color:#ff6b6b;">${msg}</td></tr>`;
        recordCountBadge.textContent = '0';
        allLecturas = [];
    }

    // Obtener datos desde Firebase (nodo lecturas) leyendo campo "velocidad_viento"
    async function fetchLecturas() {
        try {
            const url = `${FIREBASE_LECTURAS_URL}?auth=${FIREBASE_TOKEN}`;
            const resp = await fetch(url);
            if(!resp.ok) throw new Error(`HTTP ${resp.status}`);
            const data = await resp.json();
            if(!data || typeof data !== 'object') throw new Error('Nodo "lecturas" vacío o inválido');

            const registros = [];
            for(const [key, val] of Object.entries(data)) {
                if(val && typeof val.timestamp === 'number') {
                    registros.push({
                        temperatura: val.temperatura ?? 0,
                        humedad: val.humedad ?? 0,
                        presion: val.presion ?? 0,
                        lluvia: val.lluvia ?? 0,
                        velocidad_viento: val.velocidad_viento ?? 0,   // ← campo añadido
                        timestamp: val.timestamp
                    });
                }
            }
            if(registros.length === 0) throw new Error('No hay registros válidos con timestamp');
            allLecturas = registros;
            renderStats(allLecturas);
            renderLatest(allLecturas);
            renderTable(allLecturas);
        } catch(err) {
            console.error(err);
            showError(err.message);
        }
    }

    // Toggle dropdown
    function toggleDropdown() {
        dropdownOpen = !dropdownOpen;
        if(dropdownOpen) {
            dropdownContent.classList.add('expanded');
            dropdownBtn.classList.add('open');
            dropdownBtn.querySelector('.arrow').textContent = '▲';
        } else {
            dropdownContent.classList.remove('expanded');
            dropdownBtn.classList.remove('open');
            dropdownBtn.querySelector('.arrow').textContent = '▼';
        }
    }
    window.toggleDropdown = toggleDropdown;

    // Inicializar
    showLoading();
    fetchLecturas();
    setInterval(fetchLecturas, REFRESH_INTERVAL);
    document.getElementById('current-year').textContent = new Date().getFullYear();
</script>
</body>
</html>
